version: '3.8'

services:
  # ── Message Queue ─────────────────────────────────────────────────────────
  redis-queue:
    image: redis:alpine
    container_name: redis-queue
    restart: always
    ports:
      - "6379:6379"
    # --- PEMBATASAN RAM DI LEVEL DOCKER ---
    deploy:
      resources:
        limits:
          memory: 256M  # Docker akan mematikan container jika lewat dari ini
        reservations:
          memory: 64M   # RAM minimal yang dipesan
    # --- CONFIG REDIS INTERNAl ---
    command: >
      redis-server
      --maxmemory 128mb
      --maxmemory-policy noeviction
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # ── AI Validator ──────────────────────────────────────────────────────────
  ai-validator:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: ai-validator
    restart: unless-stopped
    # Load secrets from .env file (copy from .env.example and fill in values).
    env_file:
      - .env
    environment:
      # Override REDIS_URL to use Docker service name, not localhost.
      REDIS_URL: redis://redis-queue:6379
      NODE_ENV: production
    volumes:
      # Persist PM2-style logs outside the container.
      - ./logs:/app/logs
    ports:
      # Webhook port — change host-side if 3100 is in use on your server.
      - "3100:3100"
    depends_on:
      redis-queue:
        condition: service_healthy
    # Give the container up to 30 s on SIGTERM before killing it.
    stop_grace_period: 30s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
